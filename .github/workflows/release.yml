name: Release

# Creates a GitHub Release with auto-generated notes when a `v*.*.*` tag is
# pushed. Runs the full CI gate (typecheck + test + build + pack check) first.
#
# npm publishing is intentionally NOT wired up here. To enable npm publish
# later:
#   1. Create an npm access token (Granular, scoped to `opencode-loop-goal`)
#   2. `gh secret set NPM_TOKEN --repo atom2ueki/opencode-loop-goal`
#   3. Add a `Publish to npm` step that runs `npm publish --access public --provenance`
#      with `NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}`. Requires
#      `id-token: write` permission (already granted below).
#
# To cut a release:
#   git tag v0.2.0
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify package contents
        run: bun run pack:check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
